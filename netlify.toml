[build]
  base    = "apps/web"
  command = "npm install && sed -i 's|http://localhost:4000|https://code-games-1.onrender.com|g' src/environments/environment.ts src/environments/environment.prod.ts && npm run build:prod"
  publish = "dist/audit-web/browser"

[build.environment]
  NODE_VERSION = "18"

# Disable the auto-installed Angular runtime plugin
[[plugins]]
  package = "@netlify/angular-runtime"
  [plugins.inputs]
    disable = true

# Angular SPA — send all routes to index.html so client-side routing works
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build]
  # Inject the API_URL env var (set this in Netlify dashboard → Site settings → Environment variables)
  # Then build the Angular frontend
  command = "npm install && sed -i \"s|apiUrl: ''|apiUrl: '${API_URL}'|g\" apps/web/src/environments/environment.prod.ts && npm run build -w apps/web"
  publish = "apps/web/dist/audit-web/browser"

# Angular SPA — send all routes to index.html so client-side routing works
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
